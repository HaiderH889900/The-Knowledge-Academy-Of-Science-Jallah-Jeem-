<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy Registration System</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #004aad;
            --light-blue: #e7f0fd;
            --white: #ffffff;
            --red: #ff0000;
            --green: #008000;
            --black: #000000;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light-blue);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Cube Animation Container */
        .cube-container {
            perspective: 1000px;
            width: 100%;
            max-width: 550px;
            padding: 20px;
        }

        .main-card {
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 74, 173, 0.2);
            transform-style: preserve-3d;
            animation: cubeRotate 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-top: 8px solid var(--primary-blue);
        }

        @keyframes cubeRotate {
            0% { transform: rotateY(-90deg) scale(0.5); opacity: 0; }
            100% { transform: rotateY(0deg) scale(1); opacity: 1; }
        }

        .academy-name {
            color: var(--primary-blue);
            text-align: center;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .signature {
            font-family: 'Dancing Script', cursive;
            text-align: center;
            color: #444;
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: block;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; color: var(--primary-blue); margin-bottom: 5px; }
        
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--primary-blue); outline: none; }

        /* Specified Fee Colors */
        #totalFees { color: var(--red); border-color: var(--red); font-weight: bold; }
        #obtainedFees { color: var(--green); border-color: var(--green); font-weight: bold; }
        #remainingFees { color: var(--black); background: #f0f0f0; font-weight: bold; }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover { background: #003a8c; }

        /* Settings Icon */
        .settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--primary-blue);
            color: white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
        }

        /* Screens */
        #login-screen, #registration-screen, #settings-screen, #records-screen { display: none; }
        .active { display: block !important; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: var(--primary-blue); color: white; }
    </style>
</head>
<body>

<div class="settings-btn" onclick="showSettings()">⚙️</div>

<div class="cube-container">
    <div id="login-screen" class="main-card active">
        <h2 class="academy-name">Admin Login</h2>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="userIn">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="passIn">
        </div>
        <button class="btn" onclick="login()">Access System</button>
    </div>

    <div id="registration-screen" class="main-card">
        <h2 class="academy-name">The Knowledge Academy Of Science JallaH Jeem</h2>
        <span class="signature">Made By IT Engineer: Hasnain Haider <br> Mobile: 03014464374</span>
        
        <form id="regForm">
            <div class="input-group"><label>Student Name</label><input type="text" id="sName" required></div>
            <div class="input-group"><label>Father Name</label><input type="text" id="fName" required></div>
            <div class="input-group"><label>Mobile Number</label><input type="text" id="sMob" required></div>
            <div class="input-group"><label>Address</label><input type="text" id="sAddr" required></div>
            <div class="input-group"><label>Class</label><input type="text" id="sClass" required></div>
            
            <div style="display: flex; gap: 10px;">
                <div class="input-group"><label>Total Fees</label><input type="number" id="totalFees" oninput="calculateFees()"></div>
                <div class="input-group"><label>Obtained Fees</label><input type="number" id="obtainedFees" oninput="calculateFees()"></div>
            </div>
            <div class="input-group"><label>Remaining Fees</label><input type="number" id="remainingFees" readonly></div>
            
            <button type="button" class="btn" onclick="saveData()">Save Student Record</button>
            <button type="button" class="btn" style="background:#555;" onclick="showRecords()">View Records</button>
        </form>
    </div>

    <div id="settings-screen" class="main-card">
        <h2 class="academy-name">System Settings</h2>
        <div class="input-group"><label>New Username</label><input type="text" id="newU"></div>
        <div class="input-group"><label>New Password</label><input type="password" id="newP"></div>
        <button class="btn" onclick="updateCreds()">Update & Logout</button>
        <button class="btn" style="background:#888;" onclick="navTo('registration-screen')">Cancel</button>
    </div>

    <div id="records-screen" class="main-card" style="max-width: 800px;">
        <h2 class="academy-name">Student Database</h2>
        <div style="overflow-x: auto;">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Class</th>
                        <th>Total</th>
                        <th>Paid</th>
                        <th>Balance</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <button class="btn" onclick="navTo('registration-screen')">Back to Form</button>
    </div>
</div>

<script>
    // Initializing Credentials
    if(!localStorage.getItem('username')) {
        localStorage.setItem('username', 'Hasnain');
        localStorage.setItem('password', '12345');
    }

    function navTo(id) {
        document.querySelectorAll('.main-card').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function login() {
        const u = document.getElementById('userIn').value;
        const p = document.getElementById('passIn').value;
        if(u === localStorage.getItem('username') && p === localStorage.getItem('password')) {
            navTo('registration-screen');
        } else {
            alert("Wrong Username or Password!");
        }
    }

    function calculateFees() {
        const total = parseFloat(document.getElementById('totalFees').value) || 0;
        const obtained = parseFloat(document.getElementById('obtainedFees').value) || 0;
        document.getElementById('remainingFees').value = total - obtained;
    }

    function saveData() {
        const student = {
            name: document.getElementById('sName').value,
            class: document.getElementById('sClass').value,
            total: document.getElementById('totalFees').value,
            paid: document.getElementById('obtainedFees').value,
            bal: document.getElementById('remainingFees').value
        };

        if(!student.name) return alert("Please enter a name");

        let data = JSON.parse(localStorage.getItem('studentData') || '[]');
        data.push(student);
        localStorage.setItem('studentData', JSON.stringify(data));
        
        alert("Record Saved Successfully!");
        document.getElementById('regForm').reset();
        calculateFees();
    }

    function showRecords() {
        const tbody = document.getElementById('tableBody');
        const data = JSON.parse(localStorage.getItem('studentData') || '[]');
        tbody.innerHTML = '';
        data.forEach(s => {
            tbody.innerHTML += `<tr>
                <td>${s.name}</td>
                <td>${s.class}</td>
                <td style="color:red">${s.total}</td>
                <td style="color:green">${s.paid}</td>
                <td>${s.bal}</td>
            </tr>`;
        });
        navTo('records-screen');
    }

    function showSettings() {
        if(document.getElementById('registration-screen').classList.contains('active')) {
            navTo('settings-screen');
        } else {
            alert("Log in first to change settings.");
        }
    }

    function updateCreds() {
        const u = document.getElementById('newU').value;
        const p = document.getElementById('newP').value;
        if(u && p) {
            localStorage.setItem('username', u);
            localStorage.setItem('password', p);
            alert("Settings Updated. Please login again.");
            location.reload();
        }
    }
</script>

</body>
</html>
